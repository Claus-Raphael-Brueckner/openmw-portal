name: Build and test

on:
- push
- pull_request

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  Linux:
    permissions:
      contents: write
    uses: ./.github/workflows/linux.yml
    with:
      release: ${{ github.ref == 'refs/heads/master' }}

  MacOS:
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        args:
          - image: macos-15
          - image: macos-15-intel
    uses: ./.github/workflows/macos.yml
    with:
      image: ${{ matrix.args.image }}
      release: ${{ github.ref == 'refs/heads/master' }}

  Windows:
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        image:
        - "2022"

    uses: ./.github/workflows/windows.yml
    with:
      image: ${{ matrix.image }}
      package: ${{ github.ref == 'refs/heads/master' }}
      release: ${{ github.ref == 'refs/heads/master' }}
