name: Release

on:
  push:
      tags:
        - openmw-**

jobs:
  Linux:
    uses: ./.github/workflows/linux.yml
    with:
      build-type: Release
      release: true
    secrets: inherit

  Windows:
    uses: ./.github/workflows/windows.yml
    with:
      image: "2022"
      build-type: Release
      package: true
      release: true
    secrets: inherit
  MacOS:
    strategy:
      fail-fast: true
      matrix:
        args:
          - image: macos-15
          - image: macos-15-intel
    uses: ./.github/workflows/macos.yml
    with:
      image: ${{ matrix.args.image }}
      build-type: Release
      release: true
